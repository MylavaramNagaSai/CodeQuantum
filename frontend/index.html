<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuantum | Master Coding with AI</title>
    
    <meta name="description" content="CodeQuantum is your personal AI-powered coding assistant. Securely log in to master programming languages, debug code, and build production-ready applications.">
    <meta name="keywords" content="AI coding, learn to code, programming assistant, software development, Python, JavaScript">
    <meta name="author" content="Mylavaram Naga Sai">
    
    <link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>

    <div class="auth-container">
        <div class="auth-header" style="text-align: center; margin-bottom: 30px; width: 100%; padding: 0;">
            <h1 style="margin: 0; padding: 0; font-size: clamp(1.5rem, 4vw, 2.1rem); line-height: 1.2;">
                <span style="font-size: 1em;">🚀</span> CodeQuantum
            </h1>
            <p style="margin: 8px 0 0 0; padding: 0; color: #5f6368; font-size: 0.95rem;">
                Master coding with your personal AI
            </p>
        </div>

        <div class="auth-tabs" id="authTabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form active-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter password">
            </div>
            <button type="submit" class="primary-btn animated-btn">Log In</button>
            <p style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="showForgotPassword()" style="font-size: 13px; color: var(--primary-color); text-decoration: none; font-weight: 500;">Forgot Password?</a>
            </p>
            <p id="loginMessage" class="status-message"></p>

            <div class="divider"><span>OR</span></div>
            <div class="social-login-container">
                <button type="button" class="social-btn google-btn" onclick="loginWithGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
                <button type="button" class="social-btn github-btn" onclick="loginWithGitHub()">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="#24292e"/></svg>
                    Continue with GitHub
                </button>
            </div>
        </form>

        <form id="signupForm" class="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" required placeholder="name@domain.com">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="signupPassword" required placeholder="8+ chars, Cap, Num, Special">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirmPassword" required placeholder="Re-enter password">
            </div>
            <button type="submit" class="primary-btn animated-btn">Next: Verification</button>
            <p id="signupMessage" class="status-message"></p>

            <div class="divider"><span>OR</span></div>
            <div class="social-login-container">
                <button type="button" class="social-btn google-btn" onclick="loginWithGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
                <button type="button" class="social-btn github-btn" onclick="loginWithGitHub()">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="#24292e"/></svg>
                    Continue with GitHub
                </button>
            </div>
        </form>

        <form id="otpForm" class="auth-form">
            <div class="auth-header">   
                <p class="otp-instruction">Check your inbox for the verification code.</p>
            </div>
            <div class="input-group">
                <label>Verification Code</label>
                <input type="text" id="otpCode" required placeholder="e.g. A1b2C3d$">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="otpName" required placeholder="e.g. Mylavaram Sai">
            </div>
            <button type="submit" class="primary-btn animated-btn">Complete Setup</button>
            <p id="otpMessage" class="status-message"></p>
        </form>

        <form id="resetForm" class="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="resetEmail" required placeholder="Registered email">
            </div>

            <div id="resetOtpFields" style="display: none; flex-direction: column; gap: 20px; margin-top: 20px;">
                <div class="input-group">
                    <label>Reset Code</label>
                    <input type="text" id="resetOtp" placeholder="Check your inbox">
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="resetNewPassword" placeholder="Min. 8 characters">
                </div>
            </div>

            <button type="submit" id="resetSubmitBtn" class="primary-btn animated-btn" style="margin-top: 15px;">Send Reset Code</button>
            <p id="resetMessage" class="status-message"></p>
            <p style="text-align: center; margin-top: 10px;">
                <a href="#" onclick="switchTab('login')" style="font-size: 13px; color: var(--text-muted); text-decoration: none;">Back to Login</a>
            </p>
        </form>

        <p style="text-align: center; color: #70757a; font-size: 0.7rem; margin-top: 15px; width: 100%;">
                Review our 
            <a href="privacy.html" style="color: #1a73e8; text-decoration: none;">Privacy Policy</a> and 
            <a href="terms.html" style="color: #1a73e8; text-decoration: none;">Terms of Service</a>.
        </p>

    </div>

    <script src="auth.js"></script>
    <script>
        function createStar() {
            const container = document.getElementById('starsContainer');
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 2;
            star.style.animationDuration = duration + 's';
            container.appendChild(star);
            setTimeout(() => star.remove(), duration * 1000);
        }
        setInterval(createStar, 250);

        // Fixed Social Login Redirects (Dynamic URLs)
        function loginWithGoogle() { 
            window.location.href = "https://api.codequantum.tech/api/auth/google/login"; 
        }

        function loginWithGitHub() {
            window.location.href = "https://api.codequantum.tech/api/auth/github/login";
        }
    </script>
</body>
</html>
